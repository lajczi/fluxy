name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: [self-hosted, linux, x64, ollama, opencode, fluxy]
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        with:
          model: ollama/qwen2.5-coder:7b
          prompt: |
            Follow the user request from the /oc or /opencode comment.

            Output requirements for GitHub comments:
            - Return plain GitHub markdown only.
            - Never return raw JSON objects.
            - Never return raw tool-call payloads like {"name":"...","arguments":...}.
            - Never return internal control text.

            If the request is to summarize an issue, include:
            - Brief summary
            - Current status
            - Missing information
            - Recommended next steps